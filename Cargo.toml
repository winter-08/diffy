[workspace]
members = [".", "crates/halogen"]

[package]
name = "diffy"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"

[features]
default = ["native"]
native = ["dep:winit"]
capture = ["dep:tiny-skia", "dep:png", "dep:fontdue"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
bytemuck = { version = "1.25.0", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"
dirs = "6.0"
glyphon = "0.10.0"
git2 = "0.20"
pollster = "0.4.0"
taffy = "0.9.2"
rfd = "0.17.2"
ureq = { version = "3.3", features = ["json"] }
tree-sitter = "0.25"
tree-sitter-rust = "0.24.1"
tree-sitter-python = "0.25.0"
tree-sitter-javascript = "0.25.0"
tree-sitter-json = "0.24.8"
tree-sitter-c = "0.24.1"
tree-sitter-cpp = "0.23.4"
tree-sitter-go = "0.25.0"
tree-sitter-bash = "0.25.1"
tree-sitter-toml = "0.20.0"
tree-sitter-nix = "0.3.0"
tree-sitter-zig = "1.1.2"
unicode-segmentation = "1.12"
arboard = "3"
neo_frizbee = { version = "0.8", features = ["match_end_col"] }
heed = "0.22"
parking_lot = "0.12"
rayon = "1.10"
tempfile = "3.14"
webbrowser = "1.0"
halogen = { path = "crates/halogen" }
resvg = "0.45"
wgpu = "28.0.0"
winit = { version = "0.30", optional = true }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

[[bin]]
name = "diffy"
path = "src/main.rs"

[dependencies.tiny-skia]
version = "0.11"
optional = true

[dependencies.png]
version = "0.17"
optional = true

[dependencies.fontdue]
version = "0.9"
optional = true

[profile.dev]
opt-level = 1
debug = 1

[profile.release]
lto = true
codegen-units = 1
