name: Update Phosphor Index

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

concurrency:
  group: update-phosphor-index
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-2025
    timeout-minutes: 360
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET: diffy
      PHOSPHOR_PACK_BASE_URL: https://blob.diffygui.com/phosphor-packs
      PHOSPHOR_PACK_PLATFORM: windows-x86_64
      PHOSPHOR_INDEX_OUTPUT: .phosphor-index/windows-x86_64.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Generate index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHOSPHOR_PACK_INDEX_PRIVATE_KEY: ${{ secrets.PHOSPHOR_PACK_INDEX_PRIVATE_KEY }}
        run: node .github/workflows/update-phosphor-index.mjs

      - name: Upload packs to R2
        run: |
          aws s3 sync .phosphor-pack-out/windows-x86_64 s3://$env:R2_BUCKET/phosphor-packs/windows-x86_64 --endpoint-url $env:R2_ENDPOINT_URL --delete
          aws s3 cp .phosphor-index/windows-x86_64.json s3://$env:R2_BUCKET/phosphor-index/windows-x86_64.json --endpoint-url $env:R2_ENDPOINT_URL
