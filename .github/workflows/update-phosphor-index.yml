name: Update Phosphor Index

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

concurrency:
  group: update-phosphor-index
  cancel-in-progress: false

jobs:
  update:
    runs-on: macos-26
    timeout-minutes: 360
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET: diffy
      PHOSPHOR_PACK_BASE_URL: https://blob.diffygui.com/phosphor-packs
      PHOSPHOR_PACK_PLATFORM: macos-aarch64
      PHOSPHOR_INDEX_OUTPUT: .phosphor-index/macos-aarch64.json
      PHOSPHOR_PACK_CONCURRENCY: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHOSPHOR_PACK_INDEX_PRIVATE_KEY: ${{ secrets.PHOSPHOR_PACK_INDEX_PRIVATE_KEY }}
        run: node .github/workflows/update-phosphor-index.mjs

      - name: Upload packs to R2
        shell: bash
        run: |
          aws s3 sync .phosphor-pack-out/macos-aarch64 "s3://${R2_BUCKET}/phosphor-packs/macos-aarch64" --endpoint-url "${R2_ENDPOINT_URL}" --delete
          aws s3 cp .phosphor-index/macos-aarch64.json "s3://${R2_BUCKET}/phosphor-index/macos-aarch64.json" --endpoint-url "${R2_ENDPOINT_URL}"
