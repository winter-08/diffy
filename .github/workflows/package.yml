name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_PACKAGER_VERSION: 0.11.8
  DIFFY_UPDATE_PUBLIC_KEY: ${{ vars.DIFFY_UPDATE_PUBLIC_KEY }}
  PHOSPHOR_PACK_INDEX_PUBLIC_KEY: ${{ vars.PHOSPHOR_PACK_INDEX_PUBLIC_KEY }}

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-26
            format_one: dmg
            format_two: ""
            macos_arch: aarch64
          - name: macos-x64
            os: macos-26-intel
            format_one: dmg
            format_two: ""
            macos_arch: x64
          - name: windows-x64
            os: windows-2025
            format_one: nsis
            format_two: ""
            macos_arch: ""
          - name: linux-x64
            os: ubuntu-24.04
            format_one: appimage
            format_two: deb
            macos_arch: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use stable Rust
        run: rustup default stable

      - name: Validate update public key
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if [[ -z "${DIFFY_UPDATE_PUBLIC_KEY:-}" ]]; then
            echo "DIFFY_UPDATE_PUBLIC_KEY repository variable is required for release builds" >&2
            exit 1
          fi
          if ! [[ "$DIFFY_UPDATE_PUBLIC_KEY" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "DIFFY_UPDATE_PUBLIC_KEY must be a 32-byte Ed25519 public key encoded as hex" >&2
            exit 1
          fi

      - name: Select full Xcode toolchain
        if: runner.os == 'macOS'
        run: |
          if [ -d /Applications/Xcode.app/Contents/Developer ]; then
            echo "DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer" >> "$GITHUB_ENV"
          fi
          xcrun --find actool
          xcrun --find SetFile

      - name: Install lld (macOS)
        if: runner.os == 'macOS'
        run: brew install lld

      - name: Validate macOS signing config
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_PRIVATE_KEY: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY }}
          APPLE_NOTARY_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_BASE64 }}
        shell: bash
        run: |
          for name in \
            APPLE_CERTIFICATE_P12_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_CODESIGN_IDENTITY \
            APPLE_KEYCHAIN_PASSWORD \
            APPLE_NOTARY_ISSUER_ID \
            APPLE_NOTARY_KEY_ID
          do
            if [[ -z "${!name:-}" ]]; then
              echo "${name} repository secret is required for macOS signing and notarization" >&2
              exit 1
            fi
          done
          if [[ -z "${APPLE_NOTARY_PRIVATE_KEY:-}" && -z "${APPLE_NOTARY_PRIVATE_KEY_BASE64:-}" ]]; then
            echo "APPLE_NOTARY_PRIVATE_KEY or APPLE_NOTARY_PRIVATE_KEY_BASE64 repository secret is required for notarization" >&2
            exit 1
          fi

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          keychain_path="${RUNNER_TEMP}/diffy-signing.keychain-db"
          certificate_path="${RUNNER_TEMP}/diffy-developer-id.p12"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$APPLE_KEYCHAIN_PASSWORD" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            lld \
            libdbus-1-dev \
            libgl1-mesa-dev \
            libssl-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Install cargo-packager
        shell: bash
        run: cargo install cargo-packager --locked --version "${CARGO_PACKAGER_VERSION}"

      - name: Package ${{ matrix.format_one }}
        if: runner.os != 'macOS'
        run: cargo packager --release --formats ${{ matrix.format_one }}

      - name: Package signed notarized macOS DMG
        if: runner.os == 'macOS'
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_PRIVATE_KEY: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY }}
          APPLE_NOTARY_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_BASE64 }}
          DIFFY_MACOS_PACKAGE_ARCH: ${{ matrix.macos_arch }}
        run: bash scripts/package-macos-release.sh

      - name: Package ${{ matrix.format_two }}
        if: matrix.format_two != ''
        run: cargo packager --release --formats ${{ matrix.format_two }}

      - name: Collect distributable artifacts
        shell: bash
        run: |
          mkdir -p dist/release
          # Copy only the final shipping artifacts — skip the .app bundle
          # (already inside the DMG), the rw.* intermediate DMG, and the
          # cargo-packager cache dir.
          find dist/packages -maxdepth 1 -type f \
            \( -name '*.dmg' -o -name '*.exe' -o -name '*.msi' \
               -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) \
            ! -name 'rw.*' \
            -exec cp {} dist/release/ \;
          ls -la dist/release

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diffy-${{ matrix.name }}
          path: dist/release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate update release config
        env:
          DIFFY_UPDATE_PRIVATE_KEY: ${{ secrets.DIFFY_UPDATE_PRIVATE_KEY }}
        shell: bash
        run: |
          if [[ -z "${DIFFY_UPDATE_PUBLIC_KEY:-}" ]]; then
            echo "DIFFY_UPDATE_PUBLIC_KEY repository variable is required for release builds" >&2
            exit 1
          fi
          if ! [[ "$DIFFY_UPDATE_PUBLIC_KEY" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "DIFFY_UPDATE_PUBLIC_KEY must be a 32-byte Ed25519 public key encoded as hex" >&2
            exit 1
          fi
          if [[ -z "${DIFFY_UPDATE_PRIVATE_KEY:-}" ]]; then
            echo "DIFFY_UPDATE_PRIVATE_KEY repository secret is required to sign update manifests" >&2
            exit 1
          fi

          package_version="$(node -e 'const fs=require("fs"); const toml=fs.readFileSync("Cargo.toml","utf8"); const match=toml.match(/\[workspace\.package\][\s\S]*?\nversion\s*=\s*"([^"]+)"/); if (!match) process.exit(1); console.log(match[1]);')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$package_version" != "$tag_version" ]]; then
            echo "tag version $tag_version does not match Cargo.toml workspace package version $package_version" >&2
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;

      - name: Generate update manifest
        env:
          DIFFY_UPDATE_PRIVATE_KEY: ${{ secrets.DIFFY_UPDATE_PRIVATE_KEY }}
          DIFFY_RELEASE_DIR: release
        run: node .github/workflows/generate-update-manifest.mjs

      - name: Generate checksums
        shell: bash
        run: |
          cd release
          shasum -a 256 * > SHA256SUMS
          ls -la

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## Install

            macOS builds are signed with Developer ID and notarized by Apple.

            ### macOS / Linux

            ```
            curl -fsSL https://raw.githubusercontent.com/seatedro/diffy/master/scripts/install.sh | bash
            ```

            Detects your OS + arch, downloads the right artifact, verifies
            the SHA256, and installs:
            - **macOS** → `/Applications/Diffy.app`
            - **Linux** → `~/.local/share/diffy/diffy.AppImage` with a
              `~/.local/bin/diffy` symlink

            ### Windows

            ```
            powershell -c "irm https://raw.githubusercontent.com/seatedro/diffy/master/scripts/install.ps1 | iex"
            ```

            Downloads the NSIS installer, verifies the SHA256, runs it.

            ### Manual install

            Grab the asset that matches your platform from the list below:

            | platform        | asset                              |
            |-----------------|------------------------------------|
            | macOS Apple Silicon | `Diffy_*_aarch64.dmg`          |
            | macOS Intel     | `Diffy_*_x64.dmg`                  |
            | Windows         | `Diffy_*_x64-setup.exe`            |
            | Linux AppImage  | `diffy_*_x64.AppImage`             |
            | Linux Debian    | `diffy_*_amd64.deb`                |

            ### Verify downloads

            `SHA256SUMS` is attached. Verify with:
            ```
            shasum -a 256 -c SHA256SUMS
            ```
