<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Diffy Text Compare Concept</title>
<style>
  :root {
    --bg:#161714; --panel:#20211d; --panel2:#262821; --line:#3a3c33;
    --text:#ece8d8; --muted:#9b9a8e; --accent:#d6ff4d;
    --add:#8fdc8b; --del:#ff7f73;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:"Avenir Next","Trebuchet MS",sans-serif;
  }
  .app { height:100vh; display:grid; grid-template-rows:44px 1fr; }
  .chrome {
    display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
    padding:0 14px; border-bottom:1px solid var(--line); background:#11120f;
  }
  .brand { color:var(--muted); font-size:13px; }
  .switch { display:flex; border:1px solid var(--line); background:var(--panel); }
  .switch button {
    border:0; padding:7px 18px; background:transparent; color:var(--muted);
    font:600 12px inherit;
  }
  .switch .active { background:var(--accent); color:#11120f; }
  .right { justify-self:end; display:flex; gap:8px; }
  button.primary { background:var(--accent); color:#11120f; border:0; padding:8px 12px; font-weight:700; }
  button.ghost { background:var(--panel); color:var(--text); border:1px solid var(--line); padding:8px 10px; }

  .workspace { display:grid; grid-template-columns:220px 1fr; min-height:0; }
  .rail { border-right:1px solid var(--line); padding:14px; background:#191a16; }
  .rail h1 { margin:0 0 18px; font-size:14px; letter-spacing:.08em; text-transform:uppercase; }
  .field { margin-bottom:16px; }
  .label { color:var(--muted); font-size:11px; text-transform:uppercase; margin-bottom:6px; }
  input {
    width:100%; background:var(--panel); color:var(--text); border:1px solid var(--line);
    padding:8px; font:13px "Berkeley Mono","Iosevka",monospace;
  }
  .stat { display:flex; justify-content:space-between; padding:7px 0; color:var(--muted); font-size:12px; }

  .editors { min-height:0; display:grid; grid-template-rows:auto 1fr; }
  .bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; border-bottom:1px solid var(--line); background:var(--panel);
  }
  .bar strong { color:var(--accent); }
  .panes { min-height:0; display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line); }
  .pane { min-height:0; display:grid; grid-template-rows:36px 1fr; background:var(--panel2); }
  .pane header {
    display:flex; justify-content:space-between; align-items:center;
    padding:0 12px; border-bottom:1px solid var(--line); color:var(--muted); font-size:12px;
  }
  textarea {
    resize:none; width:100%; height:100%; border:0; outline:0; padding:14px 16px;
    background:#1f211b; color:var(--text);
    font:13px/1.55 "Berkeley Mono","Iosevka","Menlo",monospace;
  }
  .left textarea { border-left:3px solid var(--del); }
  .rightPane textarea { border-left:3px solid var(--add); }
</style>
</head>
<body>
  <main class="app">
    <div class="chrome">
      <div class="brand">diffy / Text Compare</div>
      <div class="switch"><button class="active">Edit</button><button>Diff</button></div>
      <div class="right"><button class="ghost">Swap</button><button class="primary">Compare</button></div>
    </div>
    <section class="workspace">
      <aside class="rail">
        <h1>Text Compare</h1>
        <div class="field"><div class="label">Name</div><input value="snippet.rs" /></div>
        <div class="stat"><span>Original</span><span>128 lines</span></div>
        <div class="stat"><span>Changed</span><span>141 lines</span></div>
        <div class="stat"><span>Last diff</span><span style="color:var(--accent)">+18 -5</span></div>
      </aside>
      <section class="editors">
        <div class="bar"><span>Paste or edit both sides directly.</span><strong>Ready to compare</strong></div>
        <div class="panes">
          <div class="pane left"><header><span>Original</span><span>Cmd+V</span></header><textarea>fn total(items: &[u32]) -> u32 {
    items.iter().sum()
}</textarea></div>
          <div class="pane rightPane"><header><span>Changed</span><span>Cmd+V</span></header><textarea>fn total(items: &[u32]) -> u32 {
    items.iter().copied().sum()
}</textarea></div>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
